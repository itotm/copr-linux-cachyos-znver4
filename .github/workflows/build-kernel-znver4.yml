name: Build kernel-cachyos-znver4

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

env:
  COPR_USERNAME: itotm
  COPR_PROJECT: cachyos-kernel-znver4

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl rpm bc bison dwarves elfutils libdw-dev flex gcc

      - name: Setup rpmbuild directories
        run: |
          mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}

      - name: Get latest CachyOS/linux release
        id: release
        run: |
          TAG=$(curl -s https://api.github.com/repos/CachyOS/linux/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Tag format: cachyos-7.0.10-2
          # _basekver = 7.0        (major.minor)
          # _stablekver = 10       (patch)
          # _tag override = full tag (sovrascrive l'hardcoded -1 nello spec)
          BASEKVER=$(echo "$TAG" | sed 's/^cachyos-\([0-9]\+\.[0-9]\+\)\.[0-9]\+-[0-9]\+$/\1/')
          STABLEKVER=$(echo "$TAG" | sed 's/^cachyos-[0-9]\+\.[0-9]\+\.\([0-9]\+\)-[0-9]\+$/\1/')

          echo "basekver=$BASEKVER" >> $GITHUB_OUTPUT
          echo "stablekver=$STABLEKVER" >> $GITHUB_OUTPUT
          echo "Latest release tag: $TAG → _basekver=$BASEKVER _stablekver=$STABLEKVER _tag=$TAG"

      - name: Build SRPM
        run: |
          rpmbuild -bs \
            --define "_basekver ${{ steps.release.outputs.basekver }}" \
            --define "_stablekver ${{ steps.release.outputs.stablekver }}" \
            --define "_tag ${{ steps.release.outputs.tag }}" \
            sources/kernel-cachyos-bore/kernel-cachyos.spec

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: kernel-srpm
          path: ~/rpmbuild/SRPMS/*.src.rpm

      - name: Build on COPR
        if: github.event_name == 'workflow_dispatch' || github.repository == 'itotm/copr-linux-cachyos-znver4'
        env:
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          pip install copr-cli
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.config
          printf '%s' "$COPR_TOKEN" > ~/.config/copr

          SRPM=$(ls ~/rpmbuild/SRPMS/*.src.rpm)
          SRPM_VERSION=$(rpm -qp --queryformat '%{VERSION}' "$SRPM")
          echo "SRPM version: $SRPM_VERSION"

          echo "Checking COPR for existing build of version $SRPM_VERSION..."
          # Extract package name from SRPM
          SRPM_NAME=$(rpm -qp --queryformat '%{NAME}' "$SRPM")
          echo "Package name: $SRPM_NAME"
          EXISTING=$(curl -s \
            "https://copr.fedorainfracloud.org/api_3/package/?ownername=$COPR_USERNAME&projectname=$COPR_PROJECT&packagename=$SRPM_NAME&with_latest_succeeded_build=True" \
            | jq -r '.builds.latest_succeeded.source_package.version // empty')

          EXISTING_VERSION=$(echo "$EXISTING" | cut -d'-' -f1)
          echo "Latest succeeded build on COPR: ${EXISTING_VERSION:-none}"

          if [ "$EXISTING_VERSION" = "$SRPM_VERSION" ]; then
            echo "Version $SRPM_VERSION already built successfully on COPR, skipping."
            exit 0
          fi

          echo "Building $SRPM on COPR (async)..."
          copr-cli build --nowait $COPR_USERNAME/$COPR_PROJECT "$SRPM"
